name: SEO Audit

on:
  schedule:
    # Run every Monday at 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to audit (leave blank for production)'
        required: false
        default: ''
      run_lighthouse:
        description: 'Run Lighthouse (slower, requires Chrome)'
        required: false
        type: boolean
        default: false

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://hackeranalytics.com' }}

      - name: Start production server
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000

      - name: Run SEO Audit
        run: node scripts/seo-audit.js --url http://localhost:3000
        env:
          RUN_LIGHTHOUSE: ${{ github.event.inputs.run_lighthouse || 'false' }}

      - name: Generate SEO Task List
        run: node scripts/seo-tasks.js

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true

      - name: Check if audit files changed
        id: check_changes
        run: |
          git diff --quiet seo-audit.json seo-tasks.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit audit results
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seo-audit.json seo-tasks.md
          git commit -m "chore(seo): update audit report $(date -u +%Y-%m-%d)"
          git push

      - name: Post audit summary to job summary
        if: always()
        run: |
          if [ -f seo-audit.json ]; then
            echo "## SEO Audit Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const a = require('./seo-audit.json');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log(\`| Pages audited | \${a.meta.totalPages} |\`);
              console.log(\`| Avg SEO score | \${a.meta.avgSeoScore}/100 |\`);
              console.log(\`| Critical issues | \${a.meta.criticalIssues} |\`);
              console.log(\`| Warnings | \${a.meta.warningIssues} |\`);
              console.log(\`| Pages needing work | \${a.meta.pagesNeedingWork} |\`);
            " >> $GITHUB_STEP_SUMMARY
          fi
